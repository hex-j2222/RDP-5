# ══════════════════════════════════════════════════════════════════
# HexRDP — GitHub Actions CI/CD
# كل شيء تلقائي 100%، لا تحتاج Android Studio ولا NDK على جهازك
# ══════════════════════════════════════════════════════════════════

name: HexRDP CI/CD

on:
  push:
    branches: [ main, master, develop ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: \( {{ github.workflow }}- \){{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION:    "26.3.11579264"
  CMAKE_VERSION:  "3.22.1"
  JAVA_VERSION:   "17"
  FREERDP_TAG:    "3.5.1"
  FREERDP_PATH:   "app/src/main/cpp/FreeRDP"
  OPENSSL_BUILD_DIR: "app/src/main/cpp/openssl-build"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix Gradle Wrapper JAR
        run: |
          JAR_SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar)
          if [ "$JAR_SIZE" -lt 10000 ]; then
            GRADLE_VERSION=$(grep -oP '(?<=gradle-)\d+\.\d+(\.\d+)?(?=-)' gradle/wrapper/gradle-wrapper.properties)
            curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar || true
          fi

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew
      - run: ./gradlew lint --no-daemon

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix Gradle Wrapper JAR
        run: |
          JAR_SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar)
          if [ "$JAR_SIZE" -lt 10000 ]; then
            GRADLE_VERSION=$(grep -oP '(?<=gradle-)\d+\.\d+(\.\d+)?(?=-)' gradle/wrapper/gradle-wrapper.properties)
            curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar || true
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Install NDK & CMake
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make perl

      - name: Clone FreeRDP source
        run: |
          if [ ! -d "${{ env.FREERDP_PATH }}/.git" ]; then
            git clone --depth 1 --branch ${{ env.FREERDP_TAG }} --recurse-submodules --shallow-submodules \
              https://github.com/FreeRDP/FreeRDP.git ${{ env.FREERDP_PATH }}
          fi

      - name: Restore OpenSSL build cache
        id: openssl-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENSSL_BUILD_DIR }}
          key: openssl-\( {{ env.NDK_VERSION }}- \){{ hashFiles('app/src/main/cpp/FreeRDP/scripts/android-build-openssl.sh') }}
          restore-keys: openssl-${{ env.NDK_VERSION }}-

      # ====================== إصلاح OpenSSL ======================
      - name: Build OpenSSL for Android
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: |
          export ANDROID_NDK_ROOT=\( ANDROID_SDK_ROOT/ndk/ \){{ env.NDK_VERSION }}
          export ANDROID_SDK=$ANDROID_SDK_ROOT
          
          TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          export PATH="$TOOLCHAIN/bin:$PATH"

          OPENSSL_VERSION="3.3.2"
          OPENSSL_TAR="openssl-${OPENSSL_VERSION}.tar.gz"
          curl -fsSL "https://www.openssl.org/source/\( {OPENSSL_TAR}" -o /tmp/ \){OPENSSL_TAR}
          tar -xf /tmp/${OPENSSL_TAR} -C /tmp

          API=26
          BUILD_ROOT=\( {{ github.workspace }}/ \){{ env.OPENSSL_BUILD_DIR }}
          mkdir -p "$BUILD_ROOT"

          build_openssl() {
            local ABI=$1
            local ARCH=$2
            local TARGET=$3

            echo "🔨 Building OpenSSL for $ABI ..."
            echo "   CC = \( {TARGET} \){API}-clang"
            
            cd /tmp/openssl-${OPENSSL_VERSION}
            make clean 2>/dev/null || true

            export CC=\( {TARGET} \){API}-clang
            export CXX=\( {TARGET} \){API}-clang++
            export AR=llvm-ar
            export RANLIB=llvm-ranlib
            export STRIP=llvm-strip
            export LD=ld.lld
            export NM=llvm-nm

            local OUT="\( BUILD_ROOT/openssl- \){ABI}"
            mkdir -p "$OUT"

            ./Configure ${ARCH} \
              -D__ANDROID_API__=${API} \
              --prefix="$OUT" \
              --openssldir="$OUT/ssl" \
              no-shared \
              no-tests

            make -j$(nproc)
            make install_sw
            echo "✅ OpenSSL built for $ABI → $OUT"
          }

          build_openssl "arm64-v8a" "android-arm64" "aarch64-linux-android"
          build_openssl "x86_64"   "android-x86_64" "x86_64-linux-android"

          echo "✅ OpenSSL built successfully for all ABIs"
      # ============================================================

      - name: Set OpenSSL root environment variable
        run: echo "ANDROID_OPENSSL_ROOT=\( {{ github.workspace }}/ \){{ env.OPENSSL_BUILD_DIR }}" >> $GITHUB_ENV

      - name: Restore FreeRDP build cache
        id: freerdp-cache
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: freerdp-\( {{ env.NDK_VERSION }}- \){{ env.FREERDP_TAG }}-${{ hashFiles('app/src/main/cpp/CMakeLists.txt', 'app/src/main/cpp/hexrdp_jni.c') }}
          restore-keys: freerdp-\( {{ env.NDK_VERSION }}- \){{ env.FREERDP_TAG }}-

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            -DANDROID_OPENSSL_ROOT=$ANDROID_OPENSSL_ROOT \
            --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HexRDP-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix Gradle Wrapper JAR
        run: |
          JAR_SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar)
          if [ "$JAR_SIZE" -lt 10000 ]; then
            GRADLE_VERSION=$(grep -oP '(?<=gradle-)\d+\.\d+(\.\d+)?(?=-)' gradle/wrapper/gradle-wrapper.properties)
            curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar || true
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Install NDK & CMake
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make perl

      - name: Clone FreeRDP source
        run: |
          if [ ! -d "${{ env.FREERDP_PATH }}/.git" ]; then
            git clone --depth 1 --branch ${{ env.FREERDP_TAG }} --recurse-submodules --shallow-submodules \
              https://github.com/FreeRDP/FreeRDP.git ${{ env.FREERDP_PATH }}
          fi

      - name: Restore OpenSSL build cache
        id: openssl-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENSSL_BUILD_DIR }}
          key: openssl-\( {{ env.NDK_VERSION }}- \){{ hashFiles('app/src/main/cpp/FreeRDP/scripts/android-build-openssl.sh') }}
          restore-keys: openssl-${{ env.NDK_VERSION }}-

      # ====================== إصلاح OpenSSL (Release) ======================
      - name: Build OpenSSL for Android
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: |
          export ANDROID_NDK_ROOT=\( ANDROID_SDK_ROOT/ndk/ \){{ env.NDK_VERSION }}
          export ANDROID_SDK=$ANDROID_SDK_ROOT
          
          TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          export PATH="$TOOLCHAIN/bin:$PATH"

          OPENSSL_VERSION="3.3.2"
          OPENSSL_TAR="openssl-${OPENSSL_VERSION}.tar.gz"
          curl -fsSL "https://www.openssl.org/source/\( {OPENSSL_TAR}" -o /tmp/ \){OPENSSL_TAR}
          tar -xf /tmp/${OPENSSL_TAR} -C /tmp

          API=26
          BUILD_ROOT=\( {{ github.workspace }}/ \){{ env.OPENSSL_BUILD_DIR }}
          mkdir -p "$BUILD_ROOT"

          build_openssl() {
            local ABI=$1
            local ARCH=$2
            local TARGET=$3

            echo "🔨 Building OpenSSL for $ABI ..."
            echo "   CC = \( {TARGET} \){API}-clang"
            
            cd /tmp/openssl-${OPENSSL_VERSION}
            make clean 2>/dev/null || true

            export CC=\( {TARGET} \){API}-clang
            export CXX=\( {TARGET} \){API}-clang++
            export AR=llvm-ar
            export RANLIB=llvm-ranlib
            export STRIP=llvm-strip
            export LD=ld.lld
            export NM=llvm-nm

            local OUT="\( BUILD_ROOT/openssl- \){ABI}"
            mkdir -p "$OUT"

            ./Configure ${ARCH} \
              -D__ANDROID_API__=${API} \
              --prefix="$OUT" \
              --openssldir="$OUT/ssl" \
              no-shared \
              no-tests

            make -j$(nproc)
            make install_sw
            echo "✅ OpenSSL built for $ABI → $OUT"
          }

          build_openssl "arm64-v8a" "android-arm64" "aarch64-linux-android"
          build_openssl "x86_64"   "android-x86_64" "x86_64-linux-android"

          echo "✅ OpenSSL built successfully for all ABIs"
      # =====================================================================

      - name: Set OpenSSL root environment variable
        run: echo "ANDROID_OPENSSL_ROOT=\( {{ github.workspace }}/ \){{ env.OPENSSL_BUILD_DIR }}" >> $GITHUB_ENV

      - name: Restore FreeRDP build cache
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: freerdp-\( {{ env.NDK_VERSION }}- \){{ env.FREERDP_TAG }}-${{ hashFiles('app/src/main/cpp/CMakeLists.txt', 'app/src/main/cpp/hexrdp_jni.c') }}
          restore-keys: freerdp-\( {{ env.NDK_VERSION }}- \){{ env.FREERDP_TAG }}-

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/release.jks

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -DANDROID_OPENSSL_ROOT=$ANDROID_OPENSSL_ROOT \
            -Pandroid.injected.signing.store.file=${{ runner.temp }}/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/HexRDP-${{ github.ref_name }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: HexRDP ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/HexRDP-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
