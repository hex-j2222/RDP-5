# ══════════════════════════════════════════════════════════════════
# HexRDP — GitHub Actions CI/CD
# كل شيء تلقائي 100%، لا تحتاج Android Studio ولا NDK على جهازك
# ══════════════════════════════════════════════════════════════════
#
# كيف يعمل:
#   1. GitHub Actions يسحب كود مشروعك
#   2. يُصلح gradle-wrapper.jar (Git LFS pointer → JAR حقيقي)
#   3. يحمّل FreeRDP مباشرة من GitHub (git clone) إلى المكان الصحيح
#   4. يثبّت NDK + CMake تلقائياً
#   5. يبني OpenSSL لـ Android (arm64-v8a و x86_64) باستخدام سكربت FreeRDP
#   6. يبني APK كامل (native + Kotlin) مع تمرير مسار OpenSSL
#   7. يحفظ مخرجات FreeRDP و OpenSSL في cache → البناءات التالية سريعة جداً
#
# للـ Release (APK موقّع + نشر تلقائي على GitHub Releases):
#   أضف هذه الـ Secrets في:
#   GitHub repo → Settings → Secrets and variables → Actions → New secret
#
#   KEYSTORE_BASE64   → محتوى ملف .jks مشفّر بـ base64
#   KEY_ALIAS         → اسم الـ alias داخل الـ keystore
#   KEY_PASSWORD      → كلمة مرور الـ key
#   STORE_PASSWORD    → كلمة مرور الـ keystore
# ══════════════════════════════════════════════════════════════════

name: HexRDP CI/CD

on:
  push:
    branches: [ main, master, develop ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION:    "26.3.11579264"
  CMAKE_VERSION:  "3.22.1"
  JAVA_VERSION:   "17"
  FREERDP_TAG:    "3.5.1"
  FREERDP_PATH:   "app/src/main/cpp/FreeRDP"
  OPENSSL_BUILD_DIR: "app/src/main/cpp/openssl-build"   # مجمع مخرجات OpenSSL

# ──────────────────────────────────────────────────────────────────
jobs:

  # ── Lint (سريع، بدون native) ────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # إصلاح gradle-wrapper.jar — Git LFS يخزّنه كـ pointer (97 bytes)
      - name: Fix Gradle Wrapper JAR
        run: |
          JAR_SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar)
          echo "Current JAR size: $JAR_SIZE bytes"
          if [ "$JAR_SIZE" -lt 10000 ]; then
            echo "⚠️  gradle-wrapper.jar is a Git LFS pointer — downloading real JAR..."
            GRADLE_VERSION=$(grep -oP '(?<=gradle-)\d+\.\d+(\.\d+)?(?=-)' gradle/wrapper/gradle-wrapper.properties)
            echo "Gradle version detected: $GRADLE_VERSION"
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar \
            || curl -fsSL \
              "https://github.com/gradle/gradle/releases/download/v${GRADLE_VERSION}/gradle-${GRADLE_VERSION}-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar \
            || (
              echo "Downloading via Gradle services..."
              curl -fsSL \
                "https://services.gradle.org/versions/all" \
                | python3 -c "import sys,json; data=json.load(sys.stdin); [print(v['wrapperChecksumUrl']) for v in data if v.get('version')=='${GRADLE_VERSION}']" \
                | head -1 \
                | xargs -I{} echo "Checksum URL: {}"
              curl -fsSL \
                "https://github.com/nicowillis/gradle-wrapper-jar/releases/latest/download/gradle-wrapper.jar" \
                -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null \
              || true
            )
            echo "✅ New JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"
          else
            echo "✅ gradle-wrapper.jar is valid ($JAR_SIZE bytes)"
          fi

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - run: chmod +x gradlew
      - run: ./gradlew lint --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 7

  # ── Build Debug APK ─────────────────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: lint

    steps:
      # 1. سحب الكود
      - name: Checkout
        uses: actions/checkout@v4

      # 2. إصلاح gradle-wrapper.jar
      - name: Fix Gradle Wrapper JAR
        run: |
          JAR_SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar)
          echo "Current JAR size: $JAR_SIZE bytes"
          if [ "$JAR_SIZE" -lt 10000 ]; then
            echo "⚠️  gradle-wrapper.jar is a Git LFS pointer — downloading real JAR..."
            GRADLE_VERSION=$(grep -oP '(?<=gradle-)\d+\.\d+(\.\d+)?(?=-)' gradle/wrapper/gradle-wrapper.properties)
            echo "Gradle version detected: $GRADLE_VERSION"
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar \
            || curl -fsSL \
              "https://github.com/nicowillis/gradle-wrapper-jar/releases/latest/download/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null \
            || true
            echo "✅ New JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"
          else
            echo "✅ gradle-wrapper.jar is valid ($JAR_SIZE bytes)"
          fi

      # 3. تثبيت Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # 4. تثبيت NDK + CMake وتثبيت الإصدار لمنع Gradle من اختيار NDK أحدث
      - name: Install NDK & CMake
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          # تثبيت إصدار NDK في local.properties حتى لا يختار Gradle NDK آخر
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> local.properties
          # تصدير ANDROID_NDK_ROOT لكل الـ steps اللاحقة
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      # 5. تثبيت تبعيات البناء (make, perl) – قد تكون مثبتة مسبقاً لكن للتأكيد
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make perl

      # 6. سحب FreeRDP مباشرة (git clone)
      - name: Clone FreeRDP source
        run: |
          if [ ! -d "${{ env.FREERDP_PATH }}/.git" ]; then
            echo "📥 Cloning FreeRDP ${{ env.FREERDP_TAG }}..."
            git clone \
              --depth 1 \
              --branch ${{ env.FREERDP_TAG }} \
              --recurse-submodules \
              --shallow-submodules \
              https://github.com/FreeRDP/FreeRDP.git \
              ${{ env.FREERDP_PATH }}
            echo "✅ FreeRDP cloned successfully"
          else
            echo "✅ FreeRDP already present"
          fi

      # patch FreeRDP: تحويل find_package(SWScale REQUIRED) إلى QUIET حتى لا يفشل على Android
      - name: Patch FreeRDP for Android
        run: |
          FREERDP_ROOT="${{ github.workspace }}/${{ env.FREERDP_PATH }}"
          LIBFREERDP_CMAKE="$FREERDP_ROOT/libfreerdp/CMakeLists.txt"

          # 1. SWScale: REQUIRED → QUIET + حذف أسطر include/link
          sed -i 's/find_package(SWScale REQUIRED)/find_package(SWScale QUIET)/g' "$LIBFREERDP_CMAKE"
          sed -i '/SWScale_INCLUDE_DIR/d' "$LIBFREERDP_CMAKE"
          sed -i '/SWScale_LIBRARY/d'     "$LIBFREERDP_CMAKE"

          # 2. إزالة -Werror من كل ملفات CMake في FreeRDP داخلياً
          find "$FREERDP_ROOT" \( -name "CMakeLists.txt" -o -name "*.cmake" \) -print0 | \
            xargs -0 sed -i \
              -e 's/-Werror\b//g' \
              -e 's/ENABLE_WARNINGS_ERROR ON/ENABLE_WARNINGS_ERROR OFF/g' \
              -e 's/ENABLE_WARNINGS_ALL ON/ENABLE_WARNINGS_ALL OFF/g'

          echo "✅ FreeRDP patched (SWScale + Werror removed)"

      # 7. Cache لـ OpenSSL المُجمَّع (يُبنى مرة واحدة لكل إصدار NDK)
      - name: Restore OpenSSL build cache
        id: openssl-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENSSL_BUILD_DIR }}
          key: openssl-${{ env.NDK_VERSION }}-${{ hashFiles('app/src/main/cpp/FreeRDP/scripts/android-build-openssl.sh') }}
          restore-keys: openssl-${{ env.NDK_VERSION }}-

      # 8. بناء OpenSSL لـ arm64-v8a و x86_64 إذا لم يكن في cache
      - name: Build OpenSSL for Android
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: |
          export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}
          export ANDROID_SDK=$ANDROID_SDK_ROOT

          # ── تثبيت OpenSSL source ────────────────────────────────────
          OPENSSL_VERSION="3.3.2"
          OPENSSL_TAR="openssl-${OPENSSL_VERSION}.tar.gz"
          curl -fsSL "https://www.openssl.org/source/${OPENSSL_TAR}" -o /tmp/${OPENSSL_TAR}
          tar -xf /tmp/${OPENSSL_TAR} -C /tmp

          TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          API=26   # minSdk من build.gradle.kts
          BUILD_ROOT=${{ github.workspace }}/${{ env.OPENSSL_BUILD_DIR }}
          mkdir -p "$BUILD_ROOT"

          # إنشاء wrapper scripts تحاكي أسماء GCC التقليدية المطلوبة من OpenSSL
          # OpenSSL يبحث عن aarch64-linux-android-gcc في PATH — نوفّره كـ wrapper لـ clang
          WRAPPERS_DIR="$BUILD_ROOT/wrappers"
          mkdir -p "$WRAPPERS_DIR"

          make_wrapper() {
            local NAME=$1   # e.g. aarch64-linux-android-gcc
            local CMD=$2    # e.g. /path/to/aarch64-linux-android26-clang
            printf '#!/bin/sh\nexec "%s" "$@"\n' "$CMD" > "$WRAPPERS_DIR/$NAME"
            chmod +x "$WRAPPERS_DIR/$NAME"
          }

          # arm64-v8a wrappers
          make_wrapper "aarch64-linux-android-gcc"      "$TOOLCHAIN/bin/aarch64-linux-android${API}-clang"
          make_wrapper "aarch64-linux-android-g++"      "$TOOLCHAIN/bin/aarch64-linux-android${API}-clang++"
          make_wrapper "aarch64-linux-android-ar"       "$TOOLCHAIN/bin/llvm-ar"
          make_wrapper "aarch64-linux-android-ranlib"   "$TOOLCHAIN/bin/llvm-ranlib"
          make_wrapper "aarch64-linux-android-strip"    "$TOOLCHAIN/bin/llvm-strip"
          make_wrapper "aarch64-linux-android-ld"       "$TOOLCHAIN/bin/ld.lld"
          make_wrapper "aarch64-linux-android-nm"       "$TOOLCHAIN/bin/llvm-nm"

          # x86_64 wrappers
          make_wrapper "x86_64-linux-android-gcc"       "$TOOLCHAIN/bin/x86_64-linux-android${API}-clang"
          make_wrapper "x86_64-linux-android-g++"       "$TOOLCHAIN/bin/x86_64-linux-android${API}-clang++"
          make_wrapper "x86_64-linux-android-ar"        "$TOOLCHAIN/bin/llvm-ar"
          make_wrapper "x86_64-linux-android-ranlib"    "$TOOLCHAIN/bin/llvm-ranlib"
          make_wrapper "x86_64-linux-android-strip"     "$TOOLCHAIN/bin/llvm-strip"
          make_wrapper "x86_64-linux-android-ld"        "$TOOLCHAIN/bin/ld.lld"
          make_wrapper "x86_64-linux-android-nm"        "$TOOLCHAIN/bin/llvm-nm"

          # إضافة wrappers و toolchain إلى PATH
          export PATH="$WRAPPERS_DIR:$TOOLCHAIN/bin:$PATH"

          build_openssl() {
            local ABI=$1
            local ARCH=$2
            local TARGET=$3

            echo "🔨 Building OpenSSL for $ABI ..."
            cd /tmp/openssl-${OPENSSL_VERSION}

            # تنظيف من أي بناء سابق
            make clean 2>/dev/null || true

            # تعيين المترجم عبر متغيرات البيئة (clang مباشرة)
            export CC="$TOOLCHAIN/bin/${TARGET}${API}-clang"
            export CXX="$TOOLCHAIN/bin/${TARGET}${API}-clang++"
            export AR="$TOOLCHAIN/bin/llvm-ar"
            export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
            export STRIP="$TOOLCHAIN/bin/llvm-strip"
            export LD="$TOOLCHAIN/bin/ld.lld"
            export NM="$TOOLCHAIN/bin/llvm-nm"

            local OUT="$BUILD_ROOT/openssl-${ABI}"
            mkdir -p "$OUT"

            ./Configure ${ARCH} \
              -D__ANDROID_API__=${API} \
              --prefix="$OUT" \
              --openssldir="$OUT/ssl" \
              no-shared \
              no-tests

            make -j$(nproc)
            make install_sw
            echo "✅ OpenSSL built for $ABI → $OUT"
          }

          build_openssl "arm64-v8a" "android-arm64"  "aarch64-linux-android"
          build_openssl "x86_64"   "android-x86_64" "x86_64-linux-android"

          echo "✅ OpenSSL built successfully for all ABIs"

      # 9. تعيين متغير البيئة ANDROID_OPENSSL_ROOT لاستخدامه في Gradle
      - name: Set OpenSSL root environment variable
        run: echo "ANDROID_OPENSSL_ROOT=${{ github.workspace }}/${{ env.OPENSSL_BUILD_DIR }}" >> $GITHUB_ENV

      # 10. Cache لـ FreeRDP prebuilt
      - name: Restore FreeRDP prebuilt cache
        id: freerdp-cache
        uses: actions/cache@v4
        with:
          path: app/src/main/cpp/freerdp-prebuilt
          key: freerdp-prebuilt-${{ env.NDK_VERSION }}-${{ env.FREERDP_TAG }}

      # 11. بناء FreeRDP كـ prebuilt منفصل عبر cmake مباشرة
      # هذا يتجنب كل مشاكل add_subdirectory مع NDK toolchain
      - name: Build FreeRDP prebuilt
        if: steps.freerdp-cache.outputs.cache-hit != 'true'
        run: |
          TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          OPENSSL_ROOT=${{ github.workspace }}/${{ env.OPENSSL_BUILD_DIR }}
          PREBUILT_ROOT=${{ github.workspace }}/app/src/main/cpp/freerdp-prebuilt
          FREERDP_SRC=${{ github.workspace }}/${{ env.FREERDP_PATH }}

          build_freerdp() {
            local ABI=$1
            local ANDROID_ARCH=$2
            local API=26

            echo "🔨 Building FreeRDP prebuilt for $ABI ..."
            local OUT="$PREBUILT_ROOT/$ABI"
            local BUILD_DIR="/tmp/freerdp-build-$ABI"
            mkdir -p "$OUT" "$BUILD_DIR"

            cmake -S "$FREERDP_SRC" -B "$BUILD_DIR"               -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake               -DANDROID_ABI=$ABI               -DANDROID_PLATFORM=android-$API               -DCMAKE_BUILD_TYPE=Release               -DCMAKE_INSTALL_PREFIX="$OUT"               -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT/openssl-$ABI"               -DOPENSSL_INCLUDE_DIR="$OPENSSL_ROOT/openssl-$ABI/include"               -DOPENSSL_CRYPTO_LIBRARY="$OPENSSL_ROOT/openssl-$ABI/lib/libcrypto.a"               -DOPENSSL_SSL_LIBRARY="$OPENSSL_ROOT/openssl-$ABI/lib/libssl.a"               -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH               -DWITH_CLIENT=ON               -DWITH_SERVER=OFF               -DWITH_SHADOW=OFF               -DWITH_PLATFORM_SERVER=OFF               -DWITH_SAMPLE=OFF               -DWITH_FFMPEG=OFF               -DWITH_DSP_FFMPEG=OFF               -DWITH_VIDEO_FFMPEG=OFF               -DWITH_CUPS=OFF               -DWITH_PULSE=OFF               -DWITH_X11=OFF               -DWITH_WAYLAND=OFF               -DBUILD_TESTING=OFF               -DBUILD_SHARED_LIBS=OFF               "-DCMAKE_C_FLAGS=-Wno-error -Wno-cast-function-type-strict -Wno-implicit-function-declaration"               "-DCMAKE_CXX_FLAGS=-Wno-error -Wno-cast-function-type-strict"               -GNinja

            cmake --build "$BUILD_DIR" --parallel $(nproc)
            cmake --install "$BUILD_DIR"
            echo "✅ FreeRDP prebuilt for $ABI → $OUT"
          }

          build_freerdp "arm64-v8a" "aarch64-linux-android"
          build_freerdp "x86_64"    "x86_64-linux-android"
          echo "✅ FreeRDP prebuilt complete"

      # 12. بناء APK — Gradle يستخدم prebuilt libs مباشرة عبر CMakeLists.txt
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon --stacktrace

      # 12. رفع الـ APK كـ artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HexRDP-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ── Release (APK موقّع + GitHub Release) ────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix Gradle Wrapper JAR
        run: |
          JAR_SIZE=$(wc -c < gradle/wrapper/gradle-wrapper.jar)
          if [ "$JAR_SIZE" -lt 10000 ]; then
            GRADLE_VERSION=$(grep -oP '(?<=gradle-)\d+\.\d+(\.\d+)?(?=-)' gradle/wrapper/gradle-wrapper.properties)
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar \
            || true
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Install NDK & CMake
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> local.properties
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y make perl

      - name: Clone FreeRDP source
        run: |
          if [ ! -d "${{ env.FREERDP_PATH }}/.git" ]; then
            git clone \
              --depth 1 \
              --branch ${{ env.FREERDP_TAG }} \
              --recurse-submodules \
              --shallow-submodules \
              https://github.com/FreeRDP/FreeRDP.git \
              ${{ env.FREERDP_PATH }}
          fi

      # patch FreeRDP: تحويل find_package(SWScale REQUIRED) إلى QUIET حتى لا يفشل على Android
      - name: Patch FreeRDP for Android
        run: |
          FREERDP_ROOT="${{ github.workspace }}/${{ env.FREERDP_PATH }}"
          LIBFREERDP_CMAKE="$FREERDP_ROOT/libfreerdp/CMakeLists.txt"

          # 1. SWScale: REQUIRED → QUIET + حذف أسطر include/link
          sed -i 's/find_package(SWScale REQUIRED)/find_package(SWScale QUIET)/g' "$LIBFREERDP_CMAKE"
          sed -i '/SWScale_INCLUDE_DIR/d' "$LIBFREERDP_CMAKE"
          sed -i '/SWScale_LIBRARY/d'     "$LIBFREERDP_CMAKE"

          # 2. إزالة -Werror من كل ملفات CMake في FreeRDP داخلياً
          find "$FREERDP_ROOT" \( -name "CMakeLists.txt" -o -name "*.cmake" \) -print0 | \
            xargs -0 sed -i \
              -e 's/-Werror\b//g' \
              -e 's/ENABLE_WARNINGS_ERROR ON/ENABLE_WARNINGS_ERROR OFF/g' \
              -e 's/ENABLE_WARNINGS_ALL ON/ENABLE_WARNINGS_ALL OFF/g'

          echo "✅ FreeRDP patched (SWScale + Werror removed)"

      - name: Restore OpenSSL build cache
        id: openssl-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.OPENSSL_BUILD_DIR }}
          key: openssl-${{ env.NDK_VERSION }}-${{ hashFiles('app/src/main/cpp/FreeRDP/scripts/android-build-openssl.sh') }}
          restore-keys: openssl-${{ env.NDK_VERSION }}-

      - name: Build OpenSSL for Android
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: |
          export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}
          export ANDROID_SDK=$ANDROID_SDK_ROOT

          OPENSSL_VERSION="3.3.2"
          OPENSSL_TAR="openssl-${OPENSSL_VERSION}.tar.gz"
          curl -fsSL "https://www.openssl.org/source/${OPENSSL_TAR}" -o /tmp/${OPENSSL_TAR}
          tar -xf /tmp/${OPENSSL_TAR} -C /tmp

          TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          API=26
          BUILD_ROOT=${{ github.workspace }}/${{ env.OPENSSL_BUILD_DIR }}
          mkdir -p "$BUILD_ROOT"

          # إنشاء wrapper scripts تحاكي أسماء GCC التقليدية المطلوبة من OpenSSL
          WRAPPERS_DIR="$BUILD_ROOT/wrappers"
          mkdir -p "$WRAPPERS_DIR"

          make_wrapper() {
            local NAME=$1
            local CMD=$2
            printf '#!/bin/sh\nexec "%s" "$@"\n' "$CMD" > "$WRAPPERS_DIR/$NAME"
            chmod +x "$WRAPPERS_DIR/$NAME"
          }

          make_wrapper "aarch64-linux-android-gcc"      "$TOOLCHAIN/bin/aarch64-linux-android${API}-clang"
          make_wrapper "aarch64-linux-android-g++"      "$TOOLCHAIN/bin/aarch64-linux-android${API}-clang++"
          make_wrapper "aarch64-linux-android-ar"       "$TOOLCHAIN/bin/llvm-ar"
          make_wrapper "aarch64-linux-android-ranlib"   "$TOOLCHAIN/bin/llvm-ranlib"
          make_wrapper "aarch64-linux-android-strip"    "$TOOLCHAIN/bin/llvm-strip"
          make_wrapper "aarch64-linux-android-ld"       "$TOOLCHAIN/bin/ld.lld"
          make_wrapper "aarch64-linux-android-nm"       "$TOOLCHAIN/bin/llvm-nm"

          make_wrapper "x86_64-linux-android-gcc"       "$TOOLCHAIN/bin/x86_64-linux-android${API}-clang"
          make_wrapper "x86_64-linux-android-g++"       "$TOOLCHAIN/bin/x86_64-linux-android${API}-clang++"
          make_wrapper "x86_64-linux-android-ar"        "$TOOLCHAIN/bin/llvm-ar"
          make_wrapper "x86_64-linux-android-ranlib"    "$TOOLCHAIN/bin/llvm-ranlib"
          make_wrapper "x86_64-linux-android-strip"     "$TOOLCHAIN/bin/llvm-strip"
          make_wrapper "x86_64-linux-android-ld"        "$TOOLCHAIN/bin/ld.lld"
          make_wrapper "x86_64-linux-android-nm"        "$TOOLCHAIN/bin/llvm-nm"

          export PATH="$WRAPPERS_DIR:$TOOLCHAIN/bin:$PATH"

          build_openssl() {
            local ABI=$1
            local ARCH=$2
            local TARGET=$3

            echo "🔨 Building OpenSSL for $ABI ..."
            cd /tmp/openssl-${OPENSSL_VERSION}
            make clean 2>/dev/null || true

            export CC="$TOOLCHAIN/bin/${TARGET}${API}-clang"
            export CXX="$TOOLCHAIN/bin/${TARGET}${API}-clang++"
            export AR="$TOOLCHAIN/bin/llvm-ar"
            export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
            export STRIP="$TOOLCHAIN/bin/llvm-strip"
            export LD="$TOOLCHAIN/bin/ld.lld"
            export NM="$TOOLCHAIN/bin/llvm-nm"

            local OUT="$BUILD_ROOT/openssl-${ABI}"
            mkdir -p "$OUT"

            ./Configure ${ARCH} \
              -D__ANDROID_API__=${API} \
              --prefix="$OUT" \
              --openssldir="$OUT/ssl" \
              no-shared \
              no-tests

            make -j$(nproc)
            make install_sw
            echo "✅ OpenSSL built for $ABI → $OUT"
          }

          build_openssl "arm64-v8a" "android-arm64"  "aarch64-linux-android"
          build_openssl "x86_64"   "android-x86_64" "x86_64-linux-android"

      - name: Set OpenSSL root environment variable
        run: echo "ANDROID_OPENSSL_ROOT=${{ github.workspace }}/${{ env.OPENSSL_BUILD_DIR }}" >> $GITHUB_ENV

      - name: Restore FreeRDP prebuilt cache
        id: freerdp-cache-release
        uses: actions/cache@v4
        with:
          path: app/src/main/cpp/freerdp-prebuilt
          key: freerdp-prebuilt-${{ env.NDK_VERSION }}-${{ env.FREERDP_TAG }}

      - name: Build FreeRDP prebuilt
        if: steps.freerdp-cache-release.outputs.cache-hit != 'true'
        run: |
          TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64
          OPENSSL_ROOT=${{ github.workspace }}/${{ env.OPENSSL_BUILD_DIR }}
          PREBUILT_ROOT=${{ github.workspace }}/app/src/main/cpp/freerdp-prebuilt
          FREERDP_SRC=${{ github.workspace }}/${{ env.FREERDP_PATH }}

          build_freerdp() {
            local ABI=$1
            local API=26
            local OUT="$PREBUILT_ROOT/$ABI"
            local BUILD_DIR="/tmp/freerdp-build-$ABI"
            mkdir -p "$OUT" "$BUILD_DIR"

            cmake -S "$FREERDP_SRC" -B "$BUILD_DIR"               -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake               -DANDROID_ABI=$ABI               -DANDROID_PLATFORM=android-$API               -DCMAKE_BUILD_TYPE=Release               -DCMAKE_INSTALL_PREFIX="$OUT"               -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT/openssl-$ABI"               -DOPENSSL_INCLUDE_DIR="$OPENSSL_ROOT/openssl-$ABI/include"               -DOPENSSL_CRYPTO_LIBRARY="$OPENSSL_ROOT/openssl-$ABI/lib/libcrypto.a"               -DOPENSSL_SSL_LIBRARY="$OPENSSL_ROOT/openssl-$ABI/lib/libssl.a"               -DCMAKE_FIND_ROOT_PATH_MODE_PACKAGE=BOTH               -DWITH_CLIENT=ON -DWITH_SERVER=OFF -DWITH_SHADOW=OFF               -DWITH_PLATFORM_SERVER=OFF -DWITH_SAMPLE=OFF               -DWITH_FFMPEG=OFF -DWITH_DSP_FFMPEG=OFF -DWITH_VIDEO_FFMPEG=OFF               -DWITH_CUPS=OFF -DWITH_PULSE=OFF -DWITH_X11=OFF -DWITH_WAYLAND=OFF               -DBUILD_TESTING=OFF -DBUILD_SHARED_LIBS=OFF "-DCMAKE_C_FLAGS=-Wno-error -Wno-cast-function-type-strict -Wno-implicit-function-declaration" "-DCMAKE_CXX_FLAGS=-Wno-error -Wno-cast-function-type-strict" -GNinja

            cmake --build "$BUILD_DIR" --parallel $(nproc)
            cmake --install "$BUILD_DIR"
          }

          build_freerdp "arm64-v8a"
          build_freerdp "x86_64"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/release.jks

      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ runner.temp }}/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/HexRDP-${{ github.ref_name }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: HexRDP ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/HexRDP-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

