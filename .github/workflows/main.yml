# ══════════════════════════════════════════════════════════════════
# HexRDP — GitHub Actions CI/CD
# كل شيء تلقائي 100%، لا تحتاج Android Studio ولا NDK على جهازك
# ══════════════════════════════════════════════════════════════════
#
# كيف يعمل:
#   1. GitHub Actions يسحب كود مشروعك
#   2. يحمّل FreeRDP مباشرة من GitHub (git clone) إلى المكان الصحيح
#   3. يثبّت NDK + CMake تلقائياً
#   4. يبني APK كامل (native + Kotlin)
#   5. يحفظ مخرجات FreeRDP في cache → البناءات التالية سريعة جداً
#
# للـ Release (APK موقّع + نشر تلقائي على GitHub Releases):
#   أضف هذه الـ Secrets في:
#   GitHub repo → Settings → Secrets and variables → Actions → New secret
#
#   KEYSTORE_BASE64   → محتوى ملف .jks مشفّر بـ base64
#   KEY_ALIAS         → اسم الـ alias داخل الـ keystore
#   KEY_PASSWORD      → كلمة مرور الـ key
#   STORE_PASSWORD    → كلمة مرور الـ keystore
#
#   لإنشاء keystore جديد مباشرة عبر GitHub Actions (مرة واحدة فقط):
#   شغّل workflow يدوياً من زر "Run workflow" في تاب Actions
# ══════════════════════════════════════════════════════════════════

name: HexRDP CI/CD

on:
  push:
    branches: [ main, master, develop ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION:    "26.3.11579264"
  CMAKE_VERSION:  "3.22.1"
  JAVA_VERSION:   "17"
  GRADLE_VERSION: "8.7"
  FREERDP_TAG:    "3.5.1"
  FREERDP_PATH:   "app/src/main/cpp/FreeRDP"

# ──────────────────────────────────────────────────────────────────
jobs:

  # ── Lint (سريع، بدون native) ────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # يولّد gradlew + gradle-wrapper.jar + gradle-wrapper.properties
      # تلقائياً إن كانت غائبة أو غير مكتملة في الريبو
      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ] || [ ! -s "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "⚠️ gradle-wrapper.jar غير موجود أو فارغ — يتم توليده تلقائياً"
            which gradle >/dev/null 2>&1 || (sudo apt-get update -y && sudo apt-get install -y gradle)
            gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }} --distribution-type all
          else
            echo "✅ gradle-wrapper.jar موجود"
          fi

      - run: chmod +x gradlew
      - run: ./gradlew lint --no-daemon

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 7

  # ── Build Debug APK ─────────────────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: lint

    steps:
      # 1. سحب الكود
      - name: Checkout
        uses: actions/checkout@v4

      # 2. تثبيت Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      # يولّد ملفات الـ wrapper تلقائياً إن كانت غائبة أو معطوبة
      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ] || [ ! -s "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "⚠️ gradle-wrapper.jar غير موجود أو فارغ — يتم توليده تلقائياً"
            which gradle >/dev/null 2>&1 || (sudo apt-get update -y && sudo apt-get install -y gradle)
            gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }} --distribution-type all
          else
            echo "✅ gradle-wrapper.jar موجود"
          fi

      # 3. تثبيت NDK + CMake تلقائياً
      - name: Install NDK & CMake
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"

      # 4. Cache لمخرجات FreeRDP المُجمَّعة
      #    المفتاح يتغير فقط إذا تغيّر:
      #      - إصدار FreeRDP (FREERDP_TAG)
      #      - إصدار NDK
      #      - ملف CMakeLists.txt أو hexrdp_jni.c
      #    → في أي حالة أخرى يُستخدم الـ cache مباشرة (ثوانٍ لا دقائق)
      - name: Restore FreeRDP build cache
        id: freerdp-cache
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: freerdp-${{ env.NDK_VERSION }}-${{ env.FREERDP_TAG }}-${{ hashFiles('app/src/main/cpp/CMakeLists.txt', 'app/src/main/cpp/hexrdp_jni.c') }}
          restore-keys: freerdp-${{ env.NDK_VERSION }}-${{ env.FREERDP_TAG }}-

      # 5. سحب FreeRDP مباشرة (git clone) — لا submodule، لا جهاز محلي
      #    يُشغَّل دائماً لأن الـ clone مطلوب لملفات الـ headers
      #    حتى لو الـ cache موجود (CMake يحتاج headers وقت الإعداد)
      - name: Clone FreeRDP source
        run: |
          if [ ! -d "${{ env.FREERDP_PATH }}/.git" ]; then
            echo "📥 Cloning FreeRDP ${{ env.FREERDP_TAG }}..."
            git clone \
              --depth 1 \
              --branch ${{ env.FREERDP_TAG }} \
              --recurse-submodules \
              --shallow-submodules \
              https://github.com/FreeRDP/FreeRDP.git \
              ${{ env.FREERDP_PATH }}
            echo "✅ FreeRDP cloned successfully"
          else
            echo "✅ FreeRDP already present"
          fi

      - name: Log build plan
        run: |
          if [ "${{ steps.freerdp-cache.outputs.cache-hit }}" == "true" ]; then
            echo "⚡ Cache HIT — FreeRDP بُني سابقاً، البناء سيكون سريعاً"
          else
            echo "🔨 Cache MISS — سيُبنى FreeRDP من المصدر (30-60 دقيقة، مرة واحدة فقط)"
          fi

      # 6. بناء APK
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # 7. رفع الـ APK كـ artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HexRDP-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ── Release (APK موقّع + GitHub Release) ────────────────────────
  # يُشغَّل تلقائياً فقط عند push tag مثل: git tag v1.0.0 && git push --tags
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Generate Gradle Wrapper (if missing)
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ] || [ ! -s "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "⚠️ gradle-wrapper.jar غير موجود أو فارغ — يتم توليده تلقائياً"
            which gradle >/dev/null 2>&1 || (sudo apt-get update -y && sudo apt-get install -y gradle)
            gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }} --distribution-type all
          else
            echo "✅ gradle-wrapper.jar موجود"
          fi

      - name: Install NDK & CMake
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.NDK_VERSION }}" \
            "cmake;${{ env.CMAKE_VERSION }}"

      - name: Restore FreeRDP build cache
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/build/intermediates/cmake
          key: freerdp-${{ env.NDK_VERSION }}-${{ env.FREERDP_TAG }}-${{ hashFiles('app/src/main/cpp/CMakeLists.txt', 'app/src/main/cpp/hexrdp_jni.c') }}
          restore-keys: freerdp-${{ env.NDK_VERSION }}-${{ env.FREERDP_TAG }}-

      - name: Clone FreeRDP source
        run: |
          if [ ! -d "${{ env.FREERDP_PATH }}/.git" ]; then
            git clone \
              --depth 1 \
              --branch ${{ env.FREERDP_TAG }} \
              --recurse-submodules \
              --shallow-submodules \
              https://github.com/FreeRDP/FreeRDP.git \
              ${{ env.FREERDP_PATH }}
          fi

      # فك تشفير الـ keystore من الـ Secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/release.jks

      # بناء APK موقّع
      - name: Build Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ runner.temp }}/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/HexRDP-${{ github.ref_name }}.apk

      # نشر تلقائي على GitHub Releases
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: HexRDP ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/HexRDP-${{ github.ref_name }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
